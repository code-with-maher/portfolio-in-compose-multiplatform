name: Deploy Compose Web to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle and Develocity
        uses: gradle/actions/setup-gradle@v6

      - name: Build Wasm Distribution
        run: ./gradlew clean wasmJsBrowserDistribution --no-daemon

      - name: Pre-compress WebAssembly and Assets (Gzip & Brotli)
        run: |
          cd build/dist/wasmJs/productionExecutable
          find . -type f \( -name "*.wasm" -o -name "*.js" -o -name "*.html" -o -name "*.css" \) -exec gzip -9 -k {} +
          find . -type f \( -name "*.wasm" -o -name "*.js" -o -name "*.html" -o -name "*.css" \) -exec brotli --best -k {} +

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: build/dist/wasmJs/productionExecutable

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
