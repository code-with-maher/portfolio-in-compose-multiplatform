# 1. تحديد نوع المنتج لتطبيق Kotlin/Wasm للويب
product: wasm-js/app

# 2. تفعيل Compose Multiplatform
settings:
  compose:
    enabled: true

    # إعداد Compose Resources
    resources:
      packageName: "com.example.portfolio.resources"

# 3. تبعيات Compose Multiplatform
dependencies:
  - $compose.runtime
  - $compose.foundation
  - $compose.material3
  - $compose.ui
  - $compose.components.resources