name: Setup and Commit Kotlin Toolchain Wrapper

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  generate-and-commit-wrapper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Install Kotlin Toolchain & Generate Wrapper
        run: |
          curl -s "https://get.sdkman.io" | bash
          source "$HOME/.sdkman/bin/sdkman-init.sh"
          sdk install kotlintoolchain
          kotlin init
          chmod +x ./kotlin

      - name: Commit and Push Wrapper Files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add kotlin kotlin.bat .amper/ amper.settings.json 2>/dev.null || git add .

          if git diff --staged --quiet; then
            echo "لا توجد تغييرات جديدة لتسجيلها."
          else
            git commit -m "build: initialize Kotlin Toolchain wrapper"
            git push
          fi
