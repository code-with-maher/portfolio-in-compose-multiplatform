name: Deploy Compose Web to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle and Develocity
        uses: gradle/actions/setup-gradle@v6

      # إنشاء الـ Wrapper بإصدار 9.6.1 المكتمل وعمل Commit & Push مع [skip ci]
      - name: Generate and Push Gradle Wrapper
        run: |
          if [ ! -f ./gradlew ]; then
            echo "Gradle wrapper not found. Generating Wrapper for 9.6.1..."
            gradle wrapper --gradle-version 9.6.1 --distribution-type all
            
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            
            git add gradlew gradlew.bat gradle/wrapper/
            git commit -m "chore: add Gradle wrapper files [skip ci]"
            git push
          else
            echo "Gradle wrapper already exists."
          fi

      - name: Build Wasm Distribution
        run: ./gradlew wasmJsBrowserDistribution --build-cache

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: build/dist/wasmJs/productionExecutable

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
