name: Deploy Compose Web to GitHub Pages (Kotlin Toolchain)

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Make ./kotlin Executable
        run: chmod +x ./kotlin

      - name: Build Wasm Distribution
        run: ./kotlin build

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: build/tasks/buildWasmJs/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
